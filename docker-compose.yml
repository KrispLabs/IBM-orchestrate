services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: zerotouch_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # Shell env vars (e.g. GitHub Actions secrets) override .env values below
    environment:
      - IBM_WATSONX_API_KEY=${IBM_WATSONX_API_KEY:-}
      - IBM_WATSONX_PROJECT_ID=${IBM_WATSONX_PROJECT_ID:-}
      - IBM_WATSONX_URL=${IBM_WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      - WATSONX_STATUS=${WATSONX_STATUS:-mocked}
      - SECRET_KEY=${SECRET_KEY:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - IBM_WATSONX_API_KEY=${IBM_WATSONX_API_KEY:-}
      - IBM_WATSONX_PROJECT_ID=${IBM_WATSONX_PROJECT_ID:-}
      - IBM_WATSONX_URL=${IBM_WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      - WATSONX_STATUS=${WATSONX_STATUS:-mocked}
      - SECRET_KEY=${SECRET_KEY:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

