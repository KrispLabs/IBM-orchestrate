name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: zerotouch_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run migrations
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'True'
          DB_HOST: localhost
          DB_NAME: zerotouch_db
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: '5432'
          REDIS_URL: redis://localhost:6379/0
          IBM_WATSONX_API_KEY: ${{ secrets.IBM_WATSONX_API_KEY }}
          IBM_WATSONX_PROJECT_ID: ${{ secrets.IBM_WATSONX_PROJECT_ID }}
          IBM_WATSONX_URL: ${{ secrets.IBM_WATSONX_URL }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          # Real credentials present — disable mock so actual WatsonX is used in tests
          WATSONX_STATUS: ''
        run: cd backend && python manage.py migrate

      - name: Run tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'True'
          DB_HOST: localhost
          DB_NAME: zerotouch_db
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: '5432'
          REDIS_URL: redis://localhost:6379/0
          IBM_WATSONX_API_KEY: ${{ secrets.IBM_WATSONX_API_KEY }}
          IBM_WATSONX_PROJECT_ID: ${{ secrets.IBM_WATSONX_PROJECT_ID }}
          IBM_WATSONX_URL: ${{ secrets.IBM_WATSONX_URL }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WATSONX_STATUS: ''
        run: cd backend && pytest tests/ --cov=apps --cov-report=term-missing

      - name: Smoke-test WatsonX connectivity
        env:
          IBM_WATSONX_API_KEY: ${{ secrets.IBM_WATSONX_API_KEY }}
          IBM_WATSONX_PROJECT_ID: ${{ secrets.IBM_WATSONX_PROJECT_ID }}
          IBM_WATSONX_URL: ${{ secrets.IBM_WATSONX_URL }}
          WATSONX_STATUS: ''
        run: |
          cd backend
          python - <<'EOF'
          from apps.ai_engine.watsonx_client import generate_tests, _USE_MOCK
          if _USE_MOCK:
              print("WARNING: WatsonX running in mock mode — check secret values")
          else:
              result = generate_tests("def add(a, b):\n    return a + b", "python")
              assert len(result) > 10, "WatsonX returned empty response"
              print("WatsonX OK — generated", len(result), "chars")
          EOF

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: |
          cd frontend
          npm install
          npm run build

  docker-compose-up:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create backend .env for compose
        run: |
          cat > backend/.env <<EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_NAME=zerotouch_db
          DB_USER=postgres
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=db
          DB_PORT=5432
          REDIS_URL=redis://redis:6379/0
          GITHUB_WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
          IBM_WATSONX_URL=${{ secrets.IBM_WATSONX_URL }}
          IBM_WATSONX_API_KEY=${{ secrets.IBM_WATSONX_API_KEY }}
          IBM_WATSONX_PROJECT_ID=${{ secrets.IBM_WATSONX_PROJECT_ID }}
          WATSONX_STATUS=
          CORS_ALLOWED_ORIGINS=http://localhost:5173
          EOF

      - name: Start services
        run: docker compose up -d --build db redis backend celery

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/github/health/ && break
            echo "Waiting for backend... attempt $i"
            sleep 3
          done

      - name: Run migrations inside container
        run: docker compose exec -T backend python manage.py migrate

      - name: Verify health endpoint
        run: curl -sf http://localhost:8000/api/github/health/

      - name: Verify WatsonX inside container
        run: |
          docker compose exec -T backend python - <<'EOF'
          from apps.ai_engine.watsonx_client import _USE_MOCK
          if _USE_MOCK:
              print("WARNING: WatsonX running in mock mode inside container")
          else:
              print("WatsonX live mode active")
          EOF

      - name: Tear down
        if: always()
        run: docker compose down -v
